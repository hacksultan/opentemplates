<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>React 3 Col Portfolio - Template Launcher</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --ink: #1f2937;
      --muted: #4b5563;
      --card: #ffffff;
      --border: #d9e0ea;
      --brand: #0b66c3;
      --brand2: #0a4f95;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: radial-gradient(circle at 5% -10%, #e7f2ff 0, transparent 35%), var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
      padding: 1.25rem;
    }
    .card {
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.15rem;
      box-shadow: 0 16px 42px rgba(8, 27, 53, 0.08);
      display: grid;
      gap: 0.75rem;
    }
    h1 { margin: 0; font-size: clamp(1.2rem, 2.4vw, 1.65rem); }
    p { margin: 0; color: var(--muted); line-height: 1.45; }
    code {
      background: #f0f5fb;
      border: 1px solid #dde7f4;
      border-radius: 7px;
      padding: 0.08rem 0.35rem;
      font-size: 0.9em;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.55rem;
      margin-top: 0.1rem;
    }
    .btn {
      text-decoration: none;
      border-radius: 10px;
      padding: 0.56rem 0.84rem;
      font-weight: 600;
      border: 1px solid var(--border);
      color: #243449;
      background: #fff;
      font-size: 0.92rem;
    }
    .btn-primary {
      border: 0;
      color: #fff;
      background: linear-gradient(140deg, var(--brand), var(--brand2));
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>React 3 Col Portfolio</h1>
    <p>This is an isolated React conversion of the original <code>3-col-portfolio</code> template.</p>
    <p>Use the built output for static preview, or run Vite dev server for source-mode development.</p>
    <div class="actions">
      <a class="btn btn-primary" href="dist/index.html">Open built React website</a>
      <a class="btn" href="index.source.html">Open source entry</a>
      <a class="btn" href="README.md">Open README</a>
    </div>
    <p><strong>Dev:</strong> <code>npm install && npm run dev</code></p>
  </main>
</body>
</html>
